<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sol de medianoche</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Georgia', serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        color: black;
    }

.background {
    position: absolute;
    width: 110%;
    height: 110%;
    background: url("disco.PNG") center/cover no-repeat;
    transition: filter 0.1s linear;
}

@keyframes hit {
    0%   { transform: scale(1) translate(0,0); }
    20%  { transform: scale(1.07) translate(-10px, 6px); }
    40%  { transform: scale(1.04) translate(8px, -5px); }
    60%  { transform: scale(1.06) translate(-6px, 4px); }
    100% { transform: scale(1) translate(0,0); }
}

.background.hit {
    animation: hit 0.18s ease;
    filter: brightness(1.25) contrast(1.35) saturate(1.3);
}

    .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, rgba(255,200,120,0.15), rgba(0,0,0,0.7));
    }

    .content {
        position: relative;
        text-align: center;
        z-index: 10;
    }

    h1 {
        font-size: 3rem;
        letter-spacing: 3px;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 1.2rem;
        font-weight: normal;
        opacity: 0.8;
        letter-spacing: 2px;
    }

    button {
        margin-top: 40px;
        padding: 12px 28px;
        background: transparent;
        border: 1px solid #f4e7c5;
        color: #f4e7c5;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        background: #f4e7c5;
        color: black;
    }
</style>
</head>

<body>

<div class="background" id="bg"></div>
<div class="overlay"></div>

<div class="content">
    <h1>Sol de medianoche</h1>
    <h2>Páramo</h2>
    <button onclick="playSong()">Reproducir</button>
</div>

<audio id="audio" src="sol.mp3"></audio>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const bg = document.getElementById("bg");
    const audio = document.getElementById("audio");
    const button = document.querySelector("button");

    function triggerHit() {
        bg.classList.add("hit");

        setTimeout(() => {
            bg.classList.remove("hit");
        }, 180);
    }

    function playSong() {
        audio.play();
        button.style.display = "none";

        triggerHit(); // golpe inmediato
        setInterval(triggerHit, 4000); // luego cada 4 segundos
    }

    window.playSong = playSong;

});
</script>

</body>

</html>
